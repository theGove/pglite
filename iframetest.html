<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe repro ×10</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
    }
    h1 {
      margin: 12px 16px;
      font-size: 16px;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 8px 8px;
    }
    .frame {
      border: 1px solid #ccc;
    }
    .frame label {
      display: block;
      padding: 4px 8px;
      background: #f5f5f5;
      font-size: 12px;
      color: #444;
    }
    iframe {
      display: block;
      width: 100%;
      height: 320px;
      border: 0;
    }
  </style>
</head>
<body>
  <h1>10 iframes → shared student-club query</h1>
  <div class="grid" id="grid"></div>
  <script>
    const src =
      "https://www.websql.org/2000/03/sql.html?data=student-club&readonly=1&style=minimal&shared=1&sql=SELECT+*%0AFROM+expense%0AWHERE+cost+%3D+122.06";
    const grid = document.getElementById("grid");
    for (let i = 1; i <= 10; i++) {
      const wrap = document.createElement("div");
      wrap.className = "frame";
      wrap.innerHTML =
        `<label>iframe ${i}</label>` +
        `<iframe src="${src}" title="iframe ${i}"></iframe>`;
      grid.appendChild(wrap);
    }
  </script>
</body>
</html>
